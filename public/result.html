                    const totalWeight = currentTest.totalWeight || 0;
                    let cumulativeWeight = 0;
                    
                    currentTest.sieves.forEach(sieve => {
                        const weight = sieve.weight || 0;
                        cumulativeWeight += weight;
                        const percentageRetained = totalWeight > 0 ? (weight / totalWeight) * 100 : 0;
                        const cumulativePercentage = totalWeight > 0 ? (cumulativeWeight / totalWeight) * 100 : 0;
                        
                        textContent += `${sieve.size || 'N/A'}\t\t${weight.toFixed(3)}\t\t\t${showPercentageColumns ? `${percentageRetained.toFixed(2)}\t\t${cumulativePercentage.toFixed(2)}` : ''}\n`;
                    });
                }
            }
            
            if (currentTest.remarks) {
                textContent += `\nREMARKS:\n${currentTest.remarks}\n`;
            }
            
            textContent += `\n\nGenerated by Cube & GSB Test Dashboard\n`;
            textContent += `Date: ${new Date().toLocaleDateString()}`;
            
            const blob = new Blob([textContent], { type: 'text/plain' });
            
            if (action === 'download') {
                const link = document.createElement('a');
                link.download = `${fileName}.txt`;
                link.href = URL.createObjectURL(blob);
                link.click();
                URL.revokeObjectURL(link.href);
                showToast('Text report downloaded successfully!', 'success');
            }
        }

        // ==================== SHARE FUNCTION ====================
        async function shareViaNative() {
            // Show format selection modal for sharing
            const formats = [
                { id: 'pdf', name: 'PDF Format', icon: 'fa-file-pdf' },
                { id: 'jpg', name: 'JPG Format', icon: 'fa-file-image' },
                { id: 'png', name: 'PNG Format', icon: 'fa-image' },
                { id: 'txt', name: 'Text Format', icon: 'fa-file-alt' }
            ];
            
            // Create modal for format selection
            const modal = document.createElement('div');
            modal.className = 'share-modal';
            modal.innerHTML = `
                <div class="share-modal-content">
                    <div class="share-modal-header">
                        <h3><i class="fas fa-share-alt"></i> Share Report</h3>
                        <button class="close-modal" onclick="this.parentElement.parentElement.remove()">&times;</button>
                    </div>
                    <p>Select format to share:</p>
                    <div class="share-options">
                        ${formats.map(format => `
                            <button class="share-option-btn" onclick="shareSelectedFormat('${format.id}')">
                                <i class="fas ${format.icon}"></i>
                                <span>${format.name}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Close modal when clicking outside
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
            
            // Close with Escape key
            document.addEventListener('keydown', function closeModalOnEscape(e) {
                if (e.key === 'Escape') {
                    modal.remove();
                    document.removeEventListener('keydown', closeModalOnEscape);
                }
            });
        }

        async function shareSelectedFormat(format) {
            // Close the modal
            document.querySelector('.share-modal')?.remove();
            
            if (format === 'link') {
                copyShareLink();
                return;
            }
            
            showToast(`Preparing ${format.toUpperCase()} for sharing...`, 'info');
            
            try {
                const customerName = currentCustomer.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const testType = currentTestType === 'cube' ? 'cube' : 'gsb';
                const testNumber = testIndex !== -1 ? testIndex + 1 : 1;
                const dateStr = formatDate(currentTest.testDate || currentTest.date).replace(/[^a-z0-9]/gi, '_');
                const fileName = `${customerName}_${testType}_test_${testNumber}_${dateStr}`;
                
                let blob, mimeType;
                
                switch(format) {
                    case 'pdf':
                        blob = await generatePDFBlob(fileName);
                        mimeType = 'application/pdf';
                        break;
                    case 'jpg':
                        blob = await generateImageBlob(fileName, 'jpg');
                        mimeType = 'image/jpeg';
                        break;
                    case 'png':
                        blob = await generateImageBlob(fileName, 'png');
                        mimeType = 'image/png';
                        break;
                    case 'txt':
                        blob = generateTextBlob(fileName);
                        mimeType = 'text/plain';
                        break;
                }
                
                // Use Web Share API if available
                if (navigator.share) {
                    const file = new File([blob], `${fileName}.${format}`, { type: mimeType });
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: `${currentTestType === 'cube' ? 'Cube' : 'GSB'} Test Report`,
                            text: `Check out this ${currentTestType === 'cube' ? 'Cube' : 'GSB'} test report`
                        });
                        showToast('Report shared successfully!', 'success');
                        return;
                    }
                }
                
                // Fallback: Create download link
                const file = new File([blob], `${fileName}.${format}`, { type: mimeType });
                const url = URL.createObjectURL(file);
                
                // For desktop, create a download link
                const link = document.createElement('a');
                link.href = url;
                link.download = `${fileName}.${format}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                showToast(`${format.toUpperCase()} file ready. Click to download and share.`, 'success');
                
            } catch (error) {
                console.error('Error sharing:', error);
                showToast('Error sharing file: ' + error.message, 'error');
            }
        }

        function copyShareLink() {
            const url = window.location.href;
            
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!', 'success');
            }).catch(err => {
                console.error('Failed to copy: ', err);
                showToast('Failed to copy link', 'error');
            });
        }

        // Helper functions for blob generation
        async function generatePDFBlob(fileName) {
            const customerName = currentCustomer.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const testType = currentTestType === 'cube' ? 'cube' : 'gsb';
            const testNumber = testIndex !== -1 ? testIndex + 1 : 1;
            const dateStr = formatDate(currentTest.testDate || currentTest.date).replace(/[^a-z0-9]/gi, '_');
            const fn = fileName || `${customerName}_${testType}_test_${testNumber}_${dateStr}`;
            
            const pdf = await generatePDF(fn, 'blob');
            if (pdf && typeof pdf.output === 'function') {
                return pdf.output('blob');
            }
            throw new Error('PDF generation failed');
        }

        async function generateImageBlob(fileName, format) {
            const canvas = await generateImage(fileName, format, 'blob');
            return new Promise((resolve, reject) => {
                canvas.toBlob(blob => {
                    if (blob) resolve(blob);
                    else reject(new Error('Image blob generation failed'));
                }, `image/${format}`);
            });
        }

        function generateTextBlob(fileName) {
            const textContent = generateTextContent();
            return new Blob([textContent], { type: 'text/plain' });
        }

        function generateTextContent() {
            // Delegate to generateText logic respecting toggle state
            let textContent = '';
            const clientDepartment = currentTest.clientDepartment || currentCustomer.clientDepartment || currentCustomer.department || 'Not specified';
            const padTxt = (str, len) => String(str).padEnd(len);
            
            if (currentTestType === 'cube') {
                textContent = `CUBE TEST REPORT\n================\n\n`;
                textContent += `Customer: ${currentCustomer.name}\n`;
                textContent += `Client/Department: ${clientDepartment}\n`;
                textContent += `Phone: ${currentCustomer.phone}\n`;
                textContent += `Project: ${currentTest.projectName || currentCustomer.remark || 'Not specified'}\n`;
                textContent += `Test Date: ${formatDate(currentTest.testDate)}\n`;
                textContent += `Casting Date: ${formatDate(currentTest.castingDate)}\n`;
                textContent += `Test Age: ${currentTest.testAge || 'N/A'} days\n`;
                textContent += `Grade: ${currentTest.grade || 'N/A'}\n\n`;
                
                textContent += `TEST RESULTS:\n`;
                if (showStrengthColumn) {
                    textContent += padTxt('Cube', 10) + padTxt('Weight (kg)', 15) + padTxt('Pressure (kN)', 16) + 'Strength (N/mm²)\n';
                    textContent += '-'.repeat(56) + '\n';
                } else {
                    textContent += padTxt('Cube', 10) + padTxt('Weight (kg)', 15) + 'Pressure (kN)\n';
                    textContent += '-'.repeat(40) + '\n';
                }
                
                if (currentTest.cubes && Array.isArray(currentTest.cubes)) {
                    currentTest.cubes.forEach((cube, index) => {
                        const strength = cube.pressure ? (cube.pressure * 1000 / 22500) : 0;
                        if (showStrengthColumn) {
                            textContent += padTxt(`Cube ${index + 1}`, 10) + padTxt(cube.weight ? cube.weight.toFixed(2) : 'N/A', 15) + padTxt(cube.pressure ? cube.pressure.toFixed(2) : 'N/A', 16) + (cube.pressure ? strength.toFixed(2) : 'N/A') + '\n';
                        } else {
                            textContent += padTxt(`Cube ${index + 1}`, 10) + padTxt(cube.weight ? cube.weight.toFixed(2) : 'N/A', 15) + (cube.pressure ? cube.pressure.toFixed(2) : 'N/A') + '\n';
                        }
                    });
                }
                
                if (showStrengthColumn && currentTest.cubes && currentTest.cubes.length > 0) {
                    const pressures = currentTest.cubes.map(c => c.pressure || 0);
                    const weights = currentTest.cubes.map(c => c.weight || 0);
                    const avgPressure = pressures.reduce((a, b) => a + b, 0) / pressures.length;
                    const avgWeight = weights.reduce((a, b) => a + b, 0) / weights.length;
                    const avgStrength = pressures.map(p => (p * 1000) / 22500).reduce((a, b) => a + b, 0) / pressures.length;
                    const testAge = currentTest.testAge ? currentTest.testAge.toString() : '28';
                    const grade = currentTest.grade || 'M20';
                    const gradeRanges = gradeStrengthRanges[grade];
                    
                    textContent += `\nCALCULATIONS:\n`;
                    textContent += `Average Weight: ${avgWeight.toFixed(2)} kg\n`;
                    textContent += `Average Pressure: ${avgPressure.toFixed(2)} kN\n`;
                    textContent += `Average Compressive Strength: ${avgStrength.toFixed(2)} N/mm²\n`;
                    
                    if (gradeRanges && gradeRanges[testAge]) {
                        const r = gradeRanges[testAge];
                        textContent += `Grade ${grade} at ${testAge} days — Min: ${r.min} | Exp: ${r.exp} | Max: ${r.max} N/mm²\n`;
                        if (avgStrength < r.min) textContent += `ASSESSMENT: ❌ FAIL\n`;
                        else if (avgStrength < r.exp) textContent += `ASSESSMENT: ⚠️ LOW\n`;
                        else if (avgStrength <= r.max) textContent += `ASSESSMENT: ✅ PASS\n`;
                        else textContent += `ASSESSMENT: 📈 HIGH\n`;
                    }
                }
            } else {
                textContent = `GSB SIEVE ANALYSIS REPORT\n========================\n\n`;
                textContent += `Customer: ${currentCustomer.name}\n`;
                textContent += `Client/Department: ${clientDepartment}\n`;
                textContent += `Phone: ${currentCustomer.phone}\n`;
                textContent += `Project: ${currentTest.projectName || currentCustomer.remark || 'Not specified'}\n`;
                textContent += `Test Date: ${formatDate(currentTest.date)}\n`;
                textContent += `Total Weight: ${currentTest.totalWeight ? currentTest.totalWeight.toFixed(3) + ' kg' : 'N/A'}\n\n`;
                
                textContent += `SIEVE ANALYSIS RESULTS:\n`;
                if (showPercentageColumns) {
                    textContent += `Sieve (mm)\tWeight (kg)\tPercentage (%)\tCumulative (%)\n`;
                } else {
                    textContent += `Sieve (mm)\tWeight (kg)\n`;
                }
                
                if (currentTest.sieves && Array.isArray(currentTest.sieves)) {
                    const totalWeight = currentTest.totalWeight || 0;
                    let cumulativeWeight = 0;
                    currentTest.sieves.forEach(sieve => {
                        const weight = sieve.weight || 0;
                        cumulativeWeight += weight;
                        const pct = totalWeight > 0 ? (weight / totalWeight) * 100 : 0;
                        const cum = totalWeight > 0 ? (cumulativeWeight / totalWeight) * 100 : 0;
                        if (showPercentageColumns) {
                            textContent += `${sieve.size || 'N/A'}\t${weight.toFixed(3)}\t${pct.toFixed(2)}\t${cum.toFixed(2)}\n`;
                        } else {
                            textContent += `${sieve.size || 'N/A'}\t${weight.toFixed(3)}\n`;
                        }
                    });
                }
            }
            
            if (currentTest.remarks) textContent += `\nREMARKS:\n${currentTest.remarks}\n`;
            textContent += `\n\nGenerated by Cube & GSB Test Dashboard\nDate: ${new Date().toLocaleDateString()}`;
            return textContent;
        }

        // ==================== UTILITY FUNCTIONS ====================
        function formatDate(dateInput) {
            if (!dateInput) return 'N/A';
            
            try {
                let date;
                if (dateInput.toDate) {
                    // Firebase Timestamp
                    date = dateInput.toDate();
                } else if (dateInput.seconds) {
                    // Firebase Timestamp object
                    date = new Date(dateInput.seconds * 1000);
                } else if (typeof dateInput === 'string') {
                    // String date
                    date = new Date(dateInput);
                } else if (typeof dateInput === 'object' && dateInput._seconds) {
                    // Another format of Firebase timestamp
                    date = new Date(dateInput._seconds * 1000);
                } else {
                    return 'N/A';
                }
                
                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch (error) {
                console.error("Error formatting date:", error, dateInput);
                return 'Invalid Date';
            }
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
